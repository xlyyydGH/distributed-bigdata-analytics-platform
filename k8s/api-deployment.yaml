apiVersion: apps/v1
kind: Deployment
metadata:
  name: bigdata-analytics-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bigdata-analytics-api
  template:
    metadata:
      labels:
        app: bigdata-analytics-api
    spec:
      containers:
        - name: api
          image: bigdata-analytics-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MYSQL_HOST
              value: bigdata-mysql
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: bigdata-analytics-api
spec:
  type: NodePort
  selector:
    app: bigdata-analytics-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080

